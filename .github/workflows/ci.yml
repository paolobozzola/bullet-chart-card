name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Check bundle size
        run: |
          size=$(gzip -c dist/bullet-chart-card.js | wc -c)
          echo "Gzipped size: $size bytes"
          if [ "$size" -gt 51200 ]; then
            echo "Bundle exceeds 50 KB gzipped budget" >&2
            exit 1
          fi

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
